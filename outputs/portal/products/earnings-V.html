  <style>
    .company-header { display:flex; align-items:center; gap:20px; margin-bottom:28px; }
    .co-logo-wrap { width:56px; height:56px; background:#fff; border-radius:12px; display:flex; align-items:center; justify-content:center; overflow:hidden; flex-shrink:0; }
    .co-logo-wrap img { width:42px; height:42px; object-fit:contain; }
    .co-logo-fallback { width:56px; height:56px; background:var(--green-glow); border:1px solid var(--green-border); border-radius:12px; display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:0.8rem; font-weight:700; color:var(--green); }
    .co-info { display:flex; flex-direction:column; gap:4px; }
    .co-ticker { font-family:var(--font-mono); font-size:0.72rem; font-weight:700; color:var(--green); background:var(--green-glow); border:1px solid var(--green-border); padding:2px 8px; border-radius:4px; display:inline-block; width:fit-content; }
    .co-name { font-size:1.1rem; font-weight:700; color:var(--white); }
    .report-row { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.13s; gap:16px; }
    .report-row:last-child { border-bottom:none; }
    .report-row:hover { background:var(--bg3); }
    .report-row.active-report { border-left:3px solid var(--green); padding-left:17px; }
    .report-row-left { display:flex; flex-direction:column; gap:5px; }
    .report-row-meta { display:flex; align-items:center; gap:8px; }
    .report-row-date { font-size:0.8rem; color:var(--gray); }
    .report-row-arrow { color:var(--gray); flex-shrink:0; font-size:1rem; transition:color 0.13s, transform 0.13s; }
    .report-row:hover .report-row-arrow { color:var(--green); transform:translateX(3px); }
    .type-badge { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; padding:2px 7px; border-radius:4px; display:inline-block; }
    .type-badge.preview  { background:rgba(255,255,255,0.07); color:var(--gray); }
    .type-badge.analysis { background:rgba(255,255,255,0.07); color:var(--gray); }
    #preview-viewer { transition:border-color 0.2s; }
    #preview-viewer:hover { border-color:rgba(57,255,20,0.3) !important; box-shadow:0 0 24px rgba(57,255,20,0.07); }
  </style>

        <div id="preview-viewer" style="display:none; border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-top:4px;">
          <iframe id="preview-frame" src="" scrolling="no" style="width:100%; height:0; border:none; display:block; opacity:0; transition:opacity 0.2s ease;" onload="autoResize(this)"></iframe>

  <script>
    if (sessionStorage.getItem('lae_auth') !== 'true') window.location.replace('../index.html');
    if (localStorage.getItem('lae-sidebar') === 'collapsed') document.body.classList.add('sidebar-collapsed');
    function toggleSidebarCollapse() { const c = document.body.classList.toggle('sidebar-collapsed'); localStorage.setItem('lae-sidebar', c ? 'collapsed' : 'expanded'); }
    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('active'); }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('active'); }
    function logout() { sessionStorage.removeItem('lae_auth'); sessionStorage.removeItem('lae_user'); window.location.replace('../index.html'); }
    let activeItem = null, _frameObserver = null;
    function autoResize(frame) {
      if (_frameObserver) { _frameObserver.disconnect(); _frameObserver = null; }
      const sync = () => { try { const h = frame.contentDocument.body.scrollHeight; if (h > 0) frame.style.height = h + 'px'; } catch(e) {} };
      setTimeout(() => { try { sync(); frame.style.opacity = '1'; _frameObserver = new ResizeObserver(sync); _frameObserver.observe(frame.contentDocument.body); } catch(e) { frame.style.height = '2000px'; frame.style.opacity = '1'; } }, 150);
    }
    function openPreview(url, item) {
      const viewer = document.getElementById('preview-viewer'), frame = document.getElementById('preview-frame');
      if (activeItem === item) { frame.style.opacity = '0'; item.classList.remove('active-report'); activeItem = null; setTimeout(() => { viewer.style.display = 'none'; frame.src = ''; frame.style.height = '0px'; if (_frameObserver) { _frameObserver.disconnect(); _frameObserver = null; } }, 220); return; }
      if (activeItem) activeItem.classList.remove('active-report');
      activeItem = item; item.classList.add('active-report');
      if (_frameObserver) { _frameObserver.disconnect(); _frameObserver = null; }
      frame.style.opacity = '0';
      const load = () => { frame.style.height = '0px'; frame.src = url; viewer.style.display = 'block'; viewer.scrollIntoView({ behavior: 'smooth', block: 'start' }); };
      viewer.style.display !== 'none' ? setTimeout(load, 200) : load();
    }
    history.pushState(null, '', location.href);
    window.addEventListener('popstate', () => { if (sessionStorage.getItem('lae_auth') !== 'true') window.location.replace('../index.html'); });
  </script>
