name: COT Report – Disaggregated

on:
  schedule:
    - cron: '30 19 * * 5'  # Freitag 19:30 UTC = 21:30 CEST (30 min nach TFF)
  workflow_dispatch:        # Manuell auslösbar

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: COT Disaggregated Report generieren
        run: python skills/cot-disaggregated/scripts/generate.py

      - name: Report speichern
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/cot-disaggregated/ outputs/portal/
          git diff --staged --quiet || git commit -m "COT Disaggregated Report $(date +%Y-%m-%d)"
          git push
