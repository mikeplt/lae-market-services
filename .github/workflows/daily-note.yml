name: Daily Note

on:
  schedule:
    - cron: '30 6 * * 1-5'   # Mo–Fr 06:30 UTC (08:30 CEST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Daily Note generieren
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
        run: python skills/daily-note/generate.py

      - name: Änderungen speichern
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/daily-note/ outputs/portal/products/daily-note.html outputs/portal/dashboard-data.json
          git diff --cached --quiet || git commit -m "Daily Note $(date +'%Y-%m-%d')"
          git push
