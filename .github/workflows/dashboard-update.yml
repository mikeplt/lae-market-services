name: Dashboard Update

on:
  schedule:
    - cron: '0 8 * * 1-5'  # Mo–Fr 08:00 UTC (10:00 CEST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Top Mover aktualisieren
        run: python scripts/update-top-mover.py

      - name: Änderungen speichern
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/portal/dashboard-data.json
          git diff --staged --quiet || git commit -m "Dashboard Update $(date +%Y-%m-%d)"
          git push
