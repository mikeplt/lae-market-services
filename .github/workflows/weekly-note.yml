name: Weekly Note

on:
  schedule:
    - cron: '0 7 * * 0'  # Sonntag 07:00 UTC = 09:00 CEST
  workflow_dispatch:      # Manuell auslösbar

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Weekly Note generieren
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: python skills/weekly-note/generate.py

      - name: Report speichern
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/weekly-note/ outputs/portal/
          git diff --staged --quiet || git commit -m "Weekly Note $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
