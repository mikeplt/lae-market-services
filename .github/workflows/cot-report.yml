name: COT Report

on:
  schedule:
    - cron: '0 19 * * 5'  # Freitag 19:00 UTC = 21:00 CEST
  workflow_dispatch:       # Manuell auslösbar

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: COT Report generieren
        run: python skills/cot-report/scripts/generate.py

      - name: Report speichern
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/cot-report/
          git diff --staged --quiet || git commit -m "COT Report $(date +%Y-%m-%d)"
          git push
